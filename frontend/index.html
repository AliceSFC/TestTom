<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoDoggity Fitness Planner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .site-header {
            background: #000;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .site-header img {
            height: 38px;
            width: auto;
        }

        .site-header span {
            color: #fff;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        /* ── Page layout ── */
        .page-body {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 36px 16px 60px;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 18px rgba(0, 0, 0, 0.08);
            max-width: 640px;
            width: 100%;
            padding: 36px 40px;
        }

        /* ── Form header ── */
        .form-heading {
            font-size: 1.1rem;
            font-weight: 700;
            color: #E21E51;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        /* ── Form fields ── */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #000;
            margin-bottom: 6px;
            font-size: 0.875rem;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            background: #fff;
            color: #000;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #E21E51;
            box-shadow: 0 0 0 3px rgba(226, 30, 81, 0.1);
        }

        input[type="text"]:hover,
        select:hover {
            border-color: #bbb;
        }

        input[type="text"]::placeholder {
            color: #aaa;
        }

        .hint {
            font-size: 0.78rem;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }

        /* ── Submit button ── */
        .submit-btn {
            width: 100%;
            padding: 13px;
            background: #E21E51;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, transform 0.15s;
        }

        .submit-btn:hover {
            background: #c4174a;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Result area ── */
        #result {
            margin-top: 28px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            border-left: 4px solid #E21E51;
            display: none;
            font-size: 0.9rem;
        }

        #result.success {
            background: #fff6f8;
            border-left-color: #E21E51;
        }

        #result.error {
            background: #fff0f0;
            border-left-color: #dc3545;
        }

        /* ── Loader ── */
        .loader {
            display: none;
            text-align: center;
            margin-top: 24px;
        }

        .loader-spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #E21E51;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 10px;
        }

        .loader p {
            color: #E21E51;
            font-size: 0.875rem;
            font-weight: 500;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── Plan container ── */
        .plan-container {
            margin-top: 16px;
        }

        /* ── Day cards ── */
        .day-card {
            background: #fff;
            padding: 16px 18px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .day-card h3 {
            font-size: 0.95rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Type badge injected via CSS on the text node — approximate with border */
        .day-card h3::after {
            content: '';
            flex: 1;
            height: 2px;
            background: #f0f0f0;
            border-radius: 2px;
        }

        .day-card p {
            font-size: 0.875rem;
            color: #555;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .day-card p strong {
            color: #000;
        }

        /* ── Exercise items ── */
        .exercise-item {
            background: #f9f9f9;
            padding: 10px 14px;
            margin: 8px 0;
            border-radius: 6px;
            border-left: 3px solid #E21E51;
            font-size: 0.875rem;
        }

        .exercise-item strong {
            color: #000;
            display: block;
            margin-bottom: 3px;
        }

        .exercise-item small {
            color: #666;
            display: block;
            line-height: 1.5;
        }

        .exercise-item a {
            color: #E21E51 !important;
            text-decoration: none;
            font-weight: 600;
        }

        .exercise-item a:hover {
            text-decoration: underline;
        }

        /* ── Footer ── */
        footer {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 16px;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.03em;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .container {
                padding: 24px 20px;
            }

            .site-header span {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <img src="https://www.godoggity.com/wp-content/uploads/2023/07/cropped-FaviconPink.png" alt="GoDoggity logo">
        <span>GoDoggity Fitness Planner</span>
    </header>

    <div class="page-body">
        <div class="container">

            <p class="form-heading">Genereer een gepersonaliseerd weekplan</p>

            <form id="plannerForm">
                <div class="form-group">
                    <label for="dog_name">Hond naam</label>
                    <input type="text" id="dog_name" name="dog_name" required placeholder="Bijv. Max">
                </div>

                <div class="form-group">
                    <label for="age_group">Leeftijd groep</label>
                    <select id="age_group" name="age_group" required>
                        <option value="">Selecteer...</option>
                        <option value="puppy">Puppy</option>
                        <option value="adult">Adult</option>
                        <option value="senior">Senior</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fitness_level">Fitness level</label>
                    <select id="fitness_level" name="fitness_level" required>
                        <option value="">Selecteer...</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="limitations">Beperkingen</label>
                    <input type="text" id="limitations" name="limitations" placeholder="Bijv. knie, rug, geen springen">
                    <div class="hint">Komma gescheiden (optioneel)</div>
                </div>

                <div class="form-group">
                    <label for="activities">Activiteiten deze week</label>
                    <input type="text" id="activities" name="activities" placeholder="Bijv. Mon:agility, Wed:training">
                    <div class="hint">Formaat: dag:activiteit (optioneel)</div>
                </div>

                <div class="form-group">
                    <label for="equipment">Beschikbaar materiaal</label>
                    <select id="equipment" name="equipment" required>
                        <option value="">Selecteer...</option>
                        <option value="none">None</option>
                        <option value="basic">Basic</option>
                        <option value="full">Full</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">Genereer Weekplan</button>
            </form>

            <div class="loader" id="loader">
                <div class="loader-spinner"></div>
                <p>Plan wordt gegenereerd...</p>
            </div>

            <div id="result"></div>

        </div>
    </div>

    <footer>Powered by GoDoggity &middot; Professional Dog Fitness</footer>

    <script>
        document.getElementById('plannerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = e.target;
            const submitBtn = form.querySelector('.submit-btn');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');

            // Disable form
            submitBtn.disabled = true;
            loader.style.display = 'block';
            resultDiv.style.display = 'none';
            resultDiv.className = '';

            // Collect form data
            const formData = {
                dog_name: form.dog_name.value,
                age_group: form.age_group.value,
                fitness_level: form.fitness_level.value,
                limitations: form.limitations.value,
                activities: form.activities.value,
                equipment: form.equipment.value
            };

            try {
                const response = await fetch('https://godoggity-fitness-planner-core-api.onrender.com/generate-plan', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <h3 style="color: #28a745; margin-bottom: 15px;">✓ Weekplan gegenereerd!</h3>
                        <p><strong>Hond:</strong> ${data.dog_name}</p>
                        <p><strong>Fitness level:</strong> ${data.fitness_level}</p>
                        <div class="plan-container">
                            <h4 style="margin: 15px 0 10px 0; color: #333;">Week planning:</h4>
                            ${data.week_plan.map(day => `
                                <div class="day-card">
                                    <h3>${day.day} - ${day.type}</h3>
                                    ${day.note ? `<p><em>${day.note}</em></p>` : ''}
                                    ${day.focus ? `<p><strong>Focus:</strong> ${day.focus}</p>` : ''}
                                    ${day.warmup ? `<p><strong>Warmup:</strong> ${day.warmup}</p>` : ''}
                                    ${day.exercises && day.exercises.length > 0 ? `
                                        <div style="margin-top: 10px;">
                                            <strong>Oefeningen:</strong>
                                            ${day.exercises.map(ex => `
                                                <div class="exercise-item">
                                                    <strong>${ex.name_en || 'Exercise'}</strong>
                                                    ${ex.focus ? `<br><small>Focus: ${ex.focus}</small>` : ''}
                                                    ${ex.difficulty ? `<br><small>Difficulty: ${ex.difficulty}</small>` : ''}
                                                    ${ex.video_url ? `<br><a href="${ex.video_url}" target="_blank" style="color: #667eea; text-decoration: none;">▶ Video</a>` : ''}
                                                </div>
                                            `).join('')}
                                        </div>
                                    ` : ''}
                                    ${day.cooldown ? `<p style="margin-top: 10px;"><strong>Cooldown:</strong> ${day.cooldown}</p>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `
                        <h3 style="color: #dc3545; margin-bottom: 10px;">✗ Fout opgetreden</h3>
                        <p>${data.detail || 'Er is een fout opgetreden bij het genereren van het plan.'}</p>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    <h3 style="color: #dc3545; margin-bottom: 10px;">✗ Verbindingsfout</h3>
                    <p>Kan geen verbinding maken met de API. Controleer of de Render service online is.</p>
                    <p style="margin-top: 10px; font-size: 0.9em; color: #666;">Error: ${error.message}</p>
                `;
            } finally {
                loader.style.display = 'none';
                resultDiv.style.display = 'block';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
